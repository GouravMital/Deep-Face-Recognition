kind = "web"
previewPath = "/"
title = "Face Recognition System"
version = "1.0.0"
id = "artifacts/face-recognition"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24082

[services.development]
run = "pnpm --filter @workspace/face-recognition run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/face-recognition", "run", "build" ]
publicDir = "artifacts/face-recognition/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24082"
BASE_PATH = "/"
